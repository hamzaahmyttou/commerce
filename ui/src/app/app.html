<header class="topbar">
  <a class="brand" routerLink="/">Commerce</a>

  <nav class="nav">
    <a routerLink="/products">Products</a>
    <a *ngIf="!auth.isLoggedIn()" routerLink="/login">Login</a>
    <a *ngIf="!auth.isLoggedIn()" routerLink="/register">Register</a>

</header>

<main class="shell">
  <router-outlet></router-outlet>
</main>
